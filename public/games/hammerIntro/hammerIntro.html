<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="icon" href="../Assets/images/jumping.png" />
        <title>SeaVerse</title>
        <link rel="stylesheet" href="hammerIntro.css" />
        <!-- Google Font-->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Original+Surfer&display=swap"
            rel="stylesheet"
        />
    </head>

    <body>
        <div id="container">
            <div
                style="
                    background-color: rgb(165, 77, 42);
                    width: 1150px;
                    text-align: center;
                    font-size: 40px;
                "
            >
                Welcome to the mangrove logger game!
            </div>
            <div
                style="
                    background-color: rgb(165, 77, 42);
                    width: 1150px;
                    text-align: center;
                    left: 650px;
                    top: 230px;
                    font-size: 30px;
                "
            >
                The mangroves are currently crying for help due to loggers. Help
                Rozxie save the mangroves from the loggers by using her crab
                claw to smash them!
            </div>
            <button
                type="button"
                class="btn btn-primary"
                onclick="next()"
                style="
                    background-color: rgb(226, 199, 159);
                    height: 100px;
                    width: 200px;
                    font-size: 20px;
                    position: absolute;
                    bottom: 10%;
                    right: 10%;
                "
            >
                START GAME
            </button>
            <script src="hammerIntro.js"></script>
        </div>
    </body>
</html>
